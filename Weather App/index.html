<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex justify-center items-center">
    <main class="w-[300px] h-[250px] rounded-3xl bg-black/10 flex flex-col"> 
        <div class="flex justify-center mt-5">
            <input type="text" id="city" placeholder="Enter city" autocomplete="off" class="w-48 h-6.5 border border-black border-r-0 pl-2 rounded-l-full placeholder:text-sm placeholder:pl-1.5 focus:outline-none focus:border-1 focus:border-blue-500 text-[13px] placeholder-shown:pl-1 pl-3">
            <button id="search-btn" class="bg-blue-500 text-white h-[25px] w-10 rounded-r-full border border-black">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </button>
        </div>
    
        <div id="result" class="border-1 border-black flex flex-col items-center mt-5">
            <h3 id="city-name" class="text-2xl"></h3>
            <div class="mt-3">
                <p id="temp"></p>
                <p id="weather"></p>
                <p id="humidity"></p>
            </div>
        </div>

        <div>
            <p id="error" style="color: rgb(255, 0, 0);" class="h-full flex justify-center items-center"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
