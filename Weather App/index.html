<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex justify-center items-center">
    <main class="w-[300px] h-[300px] rounded-3xl bg-black/10"> 
        <div class="flex justify-center mt-5">
            <input type="text" id="city" placeholder="Enter city" autocomplete="off" class="border border-black border-r-0 pl-2 rounded-l-full placeholder:text-sm placeholder:pl-1.5">
            <button id="search-btn" class="bg-blue-500 text-white h-[25px] w-10 rounded-r-full border border-black">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </button>
        </div>
    
        <div id="result">
            <h3 id="city-name"></h3>
            <p id="temp"></p>
            <p id="weather"></p>
            <p id="humidity"></p>
            <p id="error" style="color: rgb(78, 75, 75);"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
